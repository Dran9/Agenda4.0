name: Frontend Guard

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  client-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Verify committed dist
        working-directory: .
        run: git diff --exit-code -- client/dist
