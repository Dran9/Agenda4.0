  <rect x="112" y="508" width="1216" height="270" rx="28" fill="#FFF4DE" stroke="#F0D8A8"/>
  <text x="142" y="554" fill="#243748" font-family="Arial, sans-serif" font-size="28" font-weight="700">Qué ganas y qué pagas</text>

  <text x="144" y="602" fill="#243748" font-family="Arial, sans-serif" font-size="20" font-weight="700">Pros</text>
  <text x="144" y="636" fill="#405261" font-family="Arial, sans-serif" font-size="20">• Modelo elegante para pausas, excepciones y “este y los siguientes”.</text>
  <text x="144" y="668" fill="#405261" font-family="Arial, sans-serif" font-size="20">• Más cerca de cómo realmente funciona un paciente recurrente.</text>

  <text x="720" y="602" fill="#243748" font-family="Arial, sans-serif" font-size="20" font-weight="700">Contras</text>
  <text x="720" y="636" fill="#405261" font-family="Arial, sans-serif" font-size="20">• Requiere nuevo esquema y reglas de negocio.</text>
  <text x="720" y="668" fill="#405261" font-family="Arial, sans-serif" font-size="20">• Más superficie de bugs si hoy tu app piensa solo en citas unitarias.</text>

  <text x="144" y="726" fill="#A86A00" font-family="Arial, sans-serif" font-size="20" font-weight="700">Conclusión:</text>
  <text x="260" y="726" fill="#405261" font-family="Arial, sans-serif" font-size="20">es el mejor modelo si después quieres que la recurrencia viva en tu propia app, no solo en GCal.</text>
